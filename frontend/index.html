<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LA MAISON DTN | Luxury Reimagined</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="logo.jpg">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#ecb913",
            "navy-deep": "#0a1128",
            "bg-light": "#f8f8f6",
            "bg-dark": "#221e10",
          },
          fontFamily: {
            display: ["Manrope", "sans-serif"],
            serif: ["Playfair Display", "serif"],
          }
        }
      }
    }
  </script>
  <style>
    html, body {
        width: 100%;
        max-width: 100vw;
        overflow-x: hidden; /* Cắt bỏ mọi thứ thò ra bên phải */
        margin: 0;
        padding: 0;
    }
    #root {
        width: 100%;
        min-height: 100vh;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
    }
    .hero-overlay {
      background: linear-gradient(to bottom, rgba(10, 17, 40, 0.4) 0%, rgba(10, 17, 40, 0.2) 50%, rgba(10, 17, 40, 0.7) 100%);
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 1px;
      background-color: #ecb913;
      transition: width 0.3s ease;
    }

    .nav-link:hover::after {
      width: 100%;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
</head>

<body class="font-display bg-bg-light text-navy-deep m-0 p-0 w-full overflow-x-hidden">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
